<!DOCTYPE html>
<html lang="en" data-depth="0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0057B7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flag Trainer">
    <title>Flag Trainer</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body data-i18n-title="appTitle">
<div class="menu-overlay" id="menuOverlay"></div>

<div class="header">
    <div id="stats">
        <p><span id="userIdDisplay"></span></p>
        <p><span data-i18n="correct"></span>: <span id="correctCount">0</span></p>
        <p><span data-i18n="incorrect"></span>: <span id="incorrectCount">0</span></p>
    </div>
    <div class="menu-wrapper">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Menu" aria-expanded="false" aria-controls="menuPanel">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="menuPanel" class="menu-panel" aria-label="Main menu">
            <a href="#" data-route="training" data-i18n="training">Training</a>
            <a href="#" data-route="countries" data-i18n="countries">Countries</a>
            <a href="#" data-route="settings" data-i18n="settings">Settings</a>
            <a href="#" data-route="login" id="logoutLink" class="logout-link" data-i18n="logout">Logout</a>
        </nav>
    </div>
</div>
<div id="containerMain">
    <div id="flagContainer">
        <img id="flagImage" alt="Flag">
    </div>
    <div id="flagIdContainer">
        <p id="flagId" style="display: none;"></p>
        <p id="flagCapital" style="display: none;"></p>
        <p id="flagContinent" style="display: none;"></p>
    </div>
    <div class="buttonsContainer">
        <div id="incorrectBtn" class="disabled">✗</div>
        <div id="correctBtn" class="disabled">✓</div>
    </div>
</div>

<script src="js/pwa.js"></script>
<script src="js/paths.js"></script>
<script src="js/profiles.js"></script>
<script src="js/i18n.js"></script>
<script src="js/menu.js"></script>
<script src="js/app.js"></script>
</body>
</html>
