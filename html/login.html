<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlagTrainer</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body data-i18n-title="appTitle">
<div id="login-container">
  <form id="login-form">
    <div id="userId-group">
      <label for="userId" class="visually-hidden">userId</label>
      <input id="userId" type="text" name="userId" data-i18n-placeholder="loginPlaceholder" data-i18n-title="loginHint" pattern="[A-Za-z]+" required autocomplete="off">
    </div>
    <button type="submit" id="login-button" data-i18n="login">Login</button>
  </form>
  <p class="login-settings-link">
    <a href="settings.html" data-i18n="settings">Settings</a>
  </p>
</div>
<script src="../js/i18n.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
