<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagTrainer</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body data-i18n-title="appTitle">
<div class="menu-overlay" id="menuOverlay"></div>

<div class="header">
    <div id="stats">
        <p><span id="userIdDisplay"></span></p>
        <p><span data-i18n="correct"></span>: <span id="correctCount">0</span></p>
        <p><span data-i18n="incorrect"></span>: <span id="incorrectCount">0</span></p>
    </div>
    <div class="menu-wrapper">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Menu" aria-expanded="false" aria-controls="menuPanel">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="menuPanel" class="menu-panel" aria-label="Main menu">
            <a href="index.html" data-i18n="training">Training</a>
            <a href="countries.html" data-i18n="countries">Countries</a>
            <a href="settings.html" data-i18n="settings">Settings</a>
            <a href="login.html" id="logoutLink" class="logout-link" data-i18n="logout">Logout</a>
        </nav>
    </div>
</div>
<div id="containerMain">
    <div id="flagContainer">
        <img id="flagImage" alt="Flag">
    </div>
    <div id="flagIdContainer">
        <p id="flagId" style="display: none;"></p>
        <p id="flagCapital" style="display: none;"></p>
        <p id="flagContinent" style="display: none;"></p>
    </div>
    <div class="buttonsContainer">
        <div id="incorrectBtn" class="disabled">✗</div>
        <div id="correctBtn" class="disabled">✓</div>
    </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/menu.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
